# Shared ESPHome config: Wi-Fi, HA API, OTA, logger.
# Included from window-opener.yaml via `packages:`.

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Window Opener Fallback"
    password: !secret fallback_password

captive_portal:

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

# Report uptime so HA can flag a wedged device.
sensor:
  - platform: uptime
    name: "Uptime"
