# Variant: NEMA17 stepper + TMC2209 in STEP/DIR mode (A4988-compatible pinout).
#
# Position: step counting. On boot the cover reports `unknown` until the
# closed-side endstop triggers and zeros the counter.
#
# Pin map: hardware/wiring/stepper.md
# Calibration: docs/calibration.md

substitutions:
  # Calibrated for the parts actually purchased:
  #   - LDO-42STH48-1684MAC stepper, 0.9° / step → 400 full steps/rev
  #   - TMC2209 default microstepping: 1/16 → 6400 microsteps/rev
  #   - Tr8x8 lead screw → 8 mm linear travel per revolution
  #   - Microsteps per mm = 6400 / 8 = 800
  #
  # Default: 180 mm usable stroke (160 mm needed for 90° turn + 20 mm headroom)
  #   180 mm × 800 microsteps/mm = 144 000 microsteps
  steps_full_stroke: "144000"

stepper:
  - platform: a4988
    id: window_stepper
    step_pin: GPIO2   # XIAO D2
    dir_pin:  GPIO1   # XIAO D1
    max_speed: 2000 steps/s
    acceleration: 1000 steps/s^2
    deceleration: 1000 steps/s^2
    sleep_pin:
      number: GPIO21  # XIAO D3 (TMC2209 EN, active-low)
      inverted: true

binary_sensor:
  # Normally-open endstop on the closed side. Wire between XIAO D8 (GPIO19) and GND.
  - platform: gpio
    id: endstop_closed
    pin:
      number: GPIO19  # XIAO D8
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      then:
        - stepper.report_position:
            id: window_stepper
            position: 0
        - stepper.set_target:
            id: window_stepper
            target: 0

cover:
  - platform: template
    name: "Window"
    id: window_cover
    device_class: window
    has_position: true
    lambda: |-
      return id(window_stepper).current_position / (float) ${steps_full_stroke};
    open_action:
      - stepper.set_target:
          id: window_stepper
          target: ${steps_full_stroke}
    close_action:
      - stepper.set_target:
          id: window_stepper
          target: 0
    stop_action:
      - stepper.set_target:
          id: window_stepper
          target: !lambda "return id(window_stepper).current_position;"
    position_action:
      - stepper.set_target:
          id: window_stepper
          target: !lambda "return (int)(pos * ${steps_full_stroke});"
