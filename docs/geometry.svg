<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12">
  <defs>
    <marker id="motion-arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1976d2"/>
    </marker>
    <marker id="dim-start" markerWidth="10" markerHeight="10" refX="1" refY="3" orient="auto">
      <polygon points="10 0, 0 3, 10 6" fill="#666"/>
    </marker>
    <marker id="dim-end" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="#fafafa"/>

  <text x="600" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#111">
    Window Opener — mounting geometry
  </text>
  <text x="600" y="52" text-anchor="middle" font-size="12" fill="#666" font-style="italic">
    W = 845 · H = 1325 · d = 120 mm · hinge on right · fixed anchor at top-middle of frame
  </text>

  <!-- ===================== PANEL 1: Front view ===================== -->
  <g transform="translate(20, 75)">
    <rect x="0" y="0" width="380" height="560" fill="#fff" stroke="#ddd" stroke-width="1" rx="4"/>
    <text x="190" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#111">1 · Front view (closed)</text>
    <text x="190" y="42" text-anchor="middle" font-size="11" fill="#888" font-style="italic">from inside the room</text>

    <!-- Frame -->
    <rect x="55" y="60" width="280" height="455" fill="#e8e4dc" stroke="#3a2510" stroke-width="2"/>
    <!-- Sash -->
    <rect x="75" y="80" width="240" height="415" fill="#c9e0e8" stroke="#2f6e4a" stroke-width="1.5"/>
    <!-- Glass -->
    <rect x="90" y="95" width="210" height="385" fill="#e5f3f7" stroke="#99a" stroke-width="0.5"/>

    <!-- Turn hinges (right edge) -->
    <circle cx="335" cy="105" r="6" fill="#c33"/>
    <circle cx="335" cy="470" r="6" fill="#c33"/>
    <text x="345" y="109" font-size="11" fill="#c33" font-style="italic">turn hinge</text>
    <text x="345" y="475" font-size="11" fill="#c33" font-style="italic">turn hinge</text>

    <!-- Tilt pivot (bottom) -->
    <line x1="60" y1="515" x2="330" y2="515" stroke="#c33" stroke-width="3" stroke-dasharray="4,3"/>
    <text x="195" y="533" text-anchor="middle" font-size="11" fill="#c33" font-style="italic">tilt pivot (bottom edge)</text>

    <!-- Handle (left middle) -->
    <rect x="57" y="270" width="18" height="40" fill="#444" stroke="#222"/>
    <text x="80" y="294" font-size="11" fill="#555">handle</text>

    <!-- Tilt stay (top-left, on handle side - matches user's window) -->
    <line x1="108" y1="80" x2="136" y2="60" stroke="#bbb" stroke-width="3"/>
    <circle cx="108" cy="80" r="3" fill="#888"/>
    <circle cx="136" cy="60" r="3" fill="#888"/>
    <text x="140" y="58" font-size="9" fill="#888" font-style="italic">tilt stay</text>

    <!-- Actuator: horizontal along the top -->
    <!-- Fixed at W/2 (screen x = 55+140 = 195), on frame's inner face (y=60).
         Moving on top of sash (y=80), d=120 mm from hinge = 240*(120/845) = 34 px from right sash edge (x=315) → x = 315-34 = 281. -->
    <line x1="195" y1="60" x2="281" y2="80" stroke="#4a4a4a" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
    <circle cx="195" cy="60" r="10" fill="#c0392b" stroke="#611" stroke-width="2"/>
    <circle cx="281" cy="80" r="9" fill="#fff" stroke="#222" stroke-width="2"/>

    <!-- d dimension -->
    <line x1="281" y1="95" x2="315" y2="95" stroke="#666" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="298" y="110" text-anchor="middle" font-size="10" fill="#555">d = 120 mm</text>

    <!-- Anchor labels -->
    <text x="195" y="50" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="700">FIXED</text>
    <text x="281" y="70" text-anchor="middle" font-size="10" fill="#222" font-weight="700">moving</text>

    <!-- ESP32 enclosure schematic, near fixed anchor -->
    <rect x="215" y="20" width="40" height="22" fill="#2a7a4a" stroke="#184a28"/>
    <text x="235" y="35" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">ESP32</text>

    <!-- W dimension -->
    <line x1="55" y1="545" x2="55" y2="535" stroke="#666"/>
    <line x1="335" y1="545" x2="335" y2="535" stroke="#666"/>
    <line x1="55" y1="540" x2="335" y2="540" stroke="#666" marker-start="url(#dim-start)" marker-end="url(#dim-end)"/>
    <text x="195" y="556" text-anchor="middle" font-size="11" fill="#444">W = 845 mm</text>
  </g>

  <!-- ===================== PANEL 2: Tilt side cross-section ===================== -->
  <g transform="translate(410, 75)">
    <rect x="0" y="0" width="380" height="560" fill="#fff" stroke="#ddd" stroke-width="1" rx="4"/>
    <text x="190" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#111">2 · Tilt mode (side cross-section)</text>
    <text x="190" y="42" text-anchor="middle" font-size="11" fill="#888" font-style="italic">sash rotates around bottom edge · θ ≈ 7° at the scissor stop</text>

    <!-- Wall -->
    <rect x="15" y="75" width="70" height="450" fill="#d8cfbf" stroke="#444" stroke-width="1.5"/>
    <text x="50" y="300" text-anchor="middle" font-size="11" fill="#666" transform="rotate(-90, 50, 300)">wall</text>

    <!-- Frame top and bottom rails -->
    <rect x="85" y="75" width="125" height="30" fill="#e8e4dc" stroke="#3a2510"/>
    <rect x="85" y="495" width="125" height="30" fill="#e8e4dc" stroke="#3a2510"/>

    <!-- Sash closed (faint) -->
    <rect x="135" y="105" width="20" height="390" fill="#c9e0e8" stroke="#2f6e4a" opacity="0.18"/>
    <text x="170" y="305" font-size="10" fill="#aaa" font-style="italic">(closed)</text>

    <!-- Sash tilted (visually exaggerated to ~15° for legibility; reality is 7°) -->
    <g transform="rotate(15, 145, 495)">
      <rect x="135" y="105" width="20" height="390" fill="#c9e0e8" stroke="#2f6e4a" stroke-width="1.5"/>
    </g>
    <text x="280" y="120" font-size="10" fill="#888" font-style="italic">(tilt angle exaggerated</text>
    <text x="280" y="133" font-size="10" fill="#888" font-style="italic">for clarity; real θ ≈ 7°)</text>

    <!-- Tilt pivot -->
    <circle cx="145" cy="495" r="6" fill="#c33"/>
    <text x="145" y="545" text-anchor="middle" font-size="11" fill="#c33" font-style="italic">tilt pivot</text>

    <!-- Actuator: fixed at top-middle of frame (schematic). Sash top, after 15° tilt: (145 + 390·sin15°, 105 + 390·(1 − cos15°)) = (246, 118.3) -->
    <line x1="145" y1="90" x2="246" y2="118" stroke="#4a4a4a" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
    <circle cx="145" cy="90" r="10" fill="#c0392b" stroke="#611" stroke-width="2"/>
    <circle cx="246" cy="118" r="9" fill="#fff" stroke="#222" stroke-width="2"/>

    <text x="145" y="80" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="700">FIXED</text>

    <!-- Tilt motion arrow -->
    <path d="M 244 200 Q 280 180, 305 170" fill="none" stroke="#1976d2" stroke-width="2.5" marker-end="url(#motion-arrow)"/>
    <text x="310" y="165" font-size="12" fill="#1976d2" font-weight="700">tilt · 160 mm gap</text>

    <!-- Numbers box -->
    <g transform="translate(20, 470)">
      <rect x="0" y="0" width="175" height="68" fill="#fff8e6" stroke="#c99b2b" stroke-width="1" rx="3"/>
      <text x="10" y="18" font-size="11" fill="#744" font-weight="700">Stroke @ full tilt (7°):</text>
      <text x="10" y="35" font-size="12" fill="#222" font-weight="700">41 mm</text>
      <text x="10" y="55" font-size="10" fill="#555">(from 302 mm closed → 343 mm)</text>
    </g>
  </g>

  <!-- ===================== PANEL 3: Turn top-down view ===================== -->
  <g transform="translate(800, 75)">
    <rect x="0" y="0" width="380" height="560" fill="#fff" stroke="#ddd" stroke-width="1" rx="4"/>
    <text x="190" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#111">3 · Turn mode (top-down view)</text>
    <text x="190" y="42" text-anchor="middle" font-size="11" fill="#888" font-style="italic">sash rotates around right edge · 90°+ hardstop into reveal</text>

    <!-- Wall segments with window opening between -->
    <rect x="15" y="95" width="90" height="60" fill="#d8cfbf" stroke="#444" stroke-width="1.5"/>
    <rect x="295" y="95" width="70" height="60" fill="#d8cfbf" stroke="#444" stroke-width="1.5"/>
    <text x="60" y="82" text-anchor="middle" font-size="11" fill="#666">wall</text>
    <text x="330" y="82" text-anchor="middle" font-size="11" fill="#666">wall</text>

    <!-- Frame jambs -->
    <rect x="105" y="95" width="12" height="60" fill="#e8e4dc" stroke="#3a2510"/>
    <rect x="283" y="95" width="12" height="60" fill="#e8e4dc" stroke="#3a2510"/>

    <!-- Sash closed (faint) -->
    <rect x="117" y="120" width="166" height="10" fill="#c9e0e8" stroke="#2f6e4a" opacity="0.25"/>
    <text x="200" y="112" text-anchor="middle" font-size="10" fill="#aaa" font-style="italic">(closed)</text>

    <!-- Sash turned 90° around right jamb (pivot at x=283, y=125) -->
    <g transform="rotate(90, 283, 125)">
      <rect x="117" y="120" width="166" height="10" fill="#c9e0e8" stroke="#2f6e4a" stroke-width="1.5"/>
    </g>

    <!-- Turn pivot -->
    <circle cx="283" cy="125" r="6" fill="#c33"/>
    <text x="300" y="110" font-size="11" fill="#c33" font-style="italic">turn pivot</text>

    <!-- Fixed anchor: at top-middle of frame in real world; in this top-down view, at x=194 (midway between jambs), y=125 (frame plane) -->
    <circle cx="194" cy="125" r="10" fill="#c0392b" stroke="#611" stroke-width="2"/>
    <text x="194" y="113" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="700">FIXED</text>

    <!-- Moving anchor: d=120 mm from pivot. Closed: (283−d_px, 125). 166 px = 845 mm → 120 mm = 23.6 px. At 90° turn, the moving anchor rotates 90° around (283,125), ending at (283, 125+23.6) = (283, 148.6) -->
    <circle cx="283" cy="149" r="9" fill="#fff" stroke="#222" stroke-width="2"/>

    <!-- Actuator line (at 90° turn) -->
    <line x1="194" y1="125" x2="283" y2="149" stroke="#4a4a4a" stroke-width="7" stroke-linecap="round" opacity="0.9"/>

    <!-- Turn motion arrow -->
    <path d="M 175 190 Q 225 270, 260 300" fill="none" stroke="#1976d2" stroke-width="2.5" marker-end="url(#motion-arrow)"/>
    <text x="115" y="270" font-size="12" fill="#1976d2" font-weight="700">turn · 90°+</text>

    <text x="190" y="430" text-anchor="middle" font-size="11" fill="#888" font-style="italic">(room)</text>

    <!-- Numbers box -->
    <g transform="translate(20, 470)">
      <rect x="0" y="0" width="220" height="68" fill="#fff8e6" stroke="#c99b2b" stroke-width="1" rx="3"/>
      <text x="10" y="18" font-size="11" fill="#744" font-weight="700">Stroke @ turn:</text>
      <text x="10" y="35" font-size="12" fill="#222" font-weight="700">90° → 137 mm   ·   100° → 156 mm</text>
      <text x="10" y="55" font-size="10" fill="#555">actuator sized 200 mm / ≥500 N</text>
    </g>
  </g>

  <!-- ===================== Legend ===================== -->
  <g transform="translate(30, 665)">
    <circle cx="8" cy="0" r="7" fill="#c0392b" stroke="#611" stroke-width="2"/>
    <text x="22" y="4" font-size="12" fill="#333">fixed anchor (rod-end on frame, top-middle)</text>

    <circle cx="298" cy="0" r="7" fill="#fff" stroke="#222" stroke-width="2"/>
    <text x="312" y="4" font-size="12" fill="#333">moving anchor (rod-end on sash, 120 mm from hinge)</text>

    <circle cx="650" cy="0" r="5" fill="#c33"/>
    <text x="663" y="4" font-size="12" fill="#333">window hinge / pivot</text>

    <line x1="820" y1="0" x2="860" y2="0" stroke="#4a4a4a" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
    <text x="870" y="4" font-size="12" fill="#333">200 mm linear actuator, ≥500 N</text>
  </g>
</svg>
