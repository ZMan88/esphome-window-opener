<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12">
  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#aaa" stroke-width="1"/>
    </pattern>
    <marker id="arrow-end" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#444"/>
    </marker>
    <marker id="dim-start" markerWidth="10" markerHeight="10" refX="1" refY="3" orient="auto">
      <polygon points="10 0, 0 3, 10 6" fill="#666"/>
    </marker>
    <marker id="dim-end" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666"/>
    </marker>
  </defs>

  <rect width="1000" height="620" fill="#fafafa"/>

  <text x="500" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#111">
    Mounting detail — side cross-section at the fixed anchor
  </text>
  <text x="500" y="50" text-anchor="middle" font-size="12" fill="#666" font-style="italic">
    vertical cut through top-middle of the frame · scale 2.5 px / mm · outside ← · → room
  </text>

  <!-- Side labels -->
  <text x="60" y="320" text-anchor="middle" font-size="13" fill="#666" font-style="italic">← outside</text>
  <text x="940" y="320" text-anchor="middle" font-size="13" fill="#666" font-style="italic">room →</text>

  <!-- Scene: 2.5 px / mm -->
  <g transform="translate(180, 90)">

    <!-- Ceiling slab -->
    <rect x="0" y="0" width="560" height="30" fill="#e0e0e0" stroke="#888"/>
    <rect x="0" y="0" width="560" height="30" fill="url(#hatch)"/>
    <text x="280" y="20" text-anchor="middle" font-size="10" fill="#444">ceiling</text>

    <!-- 20 mm gap between ceiling and top of frame -->
    <line x1="260" y1="30" x2="260" y2="80" stroke="#666" stroke-dasharray="3,2"/>
    <line x1="250" y1="30" x2="270" y2="30" stroke="#666"/>
    <line x1="250" y1="80" x2="270" y2="80" stroke="#666"/>
    <text x="290" y="58" font-size="11" fill="#666">20 mm (unused)</text>

    <!-- FRAME top rail cross-section. Stepped profile:
         - main body x=100-275, y=80-290
         - outer tongue x=100-220, y=290-340  (forms the rebate above)
         The sash tongue fits into the rebate cut-out at x=220-275, y=250-320 (approx). -->
    <path d="M 100 80
             L 275 80
             L 275 290
             L 220 290
             L 220 340
             L 100 340
             Z"
          fill="#7a4f24" stroke="#2a1a08" stroke-width="1.8"/>
    <text x="170" y="160" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">FRAME</text>
    <text x="170" y="178" text-anchor="middle" font-size="10" fill="#eee" font-style="italic">top rail (PVC)</text>

    <!-- Frame depth dimension (70 mm = 175 px) -->
    <line x1="100" y1="85" x2="100" y2="65" stroke="#666"/>
    <line x1="275" y1="85" x2="275" y2="65" stroke="#666"/>
    <line x1="100" y1="74" x2="275" y2="74" stroke="#666" marker-start="url(#dim-start)" marker-end="url(#dim-end)"/>
    <text x="187" y="64" text-anchor="middle" font-size="11" fill="#444">frame depth ≈ 70 mm</text>

    <!-- SASH — tongue engages frame rebate, main body protrudes 20 mm past the frame's inside face (x=275 → x=325) -->
    <path d="M 220 250
             L 275 250
             L 275 290
             L 325 290
             L 325 500
             L 175 500
             L 175 290
             L 220 290
             Z"
          fill="#2f6e4a" stroke="#123a26" stroke-width="1.8"/>
    <text x="250" y="415" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">SASH</text>
    <text x="250" y="432" text-anchor="middle" font-size="10" fill="#eee" font-style="italic">top rail</text>

    <!-- Tongue label (hard to annotate in-place; use a small callout) -->
    <text x="248" y="272" text-anchor="middle" font-size="8" fill="#e6ffe9" font-style="italic">tongue</text>

    <!-- Rubber seal at rebate -->
    <rect x="215" y="255" width="10" height="6" fill="#222" opacity="0.6"/>

    <!-- Glass schematic continuation -->
    <line x1="220" y1="500" x2="220" y2="520" stroke="#99c" stroke-width="2.5"/>
    <line x1="280" y1="500" x2="280" y2="520" stroke="#99c" stroke-width="2.5"/>
    <text x="250" y="536" text-anchor="middle" font-size="10" fill="#667" font-style="italic">↓ double glass</text>

    <!-- Sash protrusion dimension (20 mm = 50 px) -->
    <line x1="275" y1="510" x2="275" y2="530" stroke="#c0392b" stroke-width="1.2"/>
    <line x1="325" y1="510" x2="325" y2="530" stroke="#c0392b" stroke-width="1.2"/>
    <line x1="275" y1="522" x2="325" y2="522" stroke="#c0392b" stroke-width="1.2" marker-start="url(#dim-start)" marker-end="url(#dim-end)"/>
    <text x="300" y="543" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="700">sash protrudes 20 mm past frame</text>

    <!-- BRACKET — mounted on the frame's inside face (x=275), POSITIONED ABOVE THE SASH TOP LEVEL (y < 250) so the arm clears the sash -->
    <g>
      <!-- Mounting plate — sits at y=120-220, entirely above sash top (y=250) -->
      <rect x="252" y="120" width="28" height="100" fill="#b92c2c" stroke="#5a0d0d" stroke-width="1.5" rx="2"/>
      <!-- Arm extending into the room — at y≈165, well above the sash top -->
      <rect x="275" y="150" width="65" height="30" fill="#b92c2c" stroke="#5a0d0d" stroke-width="1.5" rx="2"/>
      <!-- M4 screws through the mounting plate -->
      <circle cx="266" cy="138" r="3" fill="#111"/>
      <circle cx="266" cy="202" r="3" fill="#111"/>
      <text x="305" y="143" font-size="10" fill="#b92c2c" font-weight="700">BRACKET</text>
    </g>

    <!-- Bracket protrusion dimension -->
    <line x1="275" y1="225" x2="275" y2="243" stroke="#666"/>
    <line x1="340" y1="225" x2="340" y2="243" stroke="#666"/>
    <line x1="275" y1="236" x2="340" y2="236" stroke="#666" marker-start="url(#dim-start)" marker-end="url(#dim-end)"/>
    <text x="307" y="232" text-anchor="middle" font-size="10" fill="#444">~25 mm</text>

    <!-- Rod-end (ball joint) at the end of the bracket arm -->
    <circle cx="360" cy="165" r="18" fill="#fff" stroke="#222" stroke-width="2"/>
    <circle cx="360" cy="165" r="7" fill="#333"/>
    <line x1="360" y1="148" x2="360" y2="182" stroke="#222" stroke-width="2"/>
    <text x="360" y="143" text-anchor="middle" font-size="10" fill="#222" font-weight="700">rod-end</text>

    <!-- ACTUATOR BODY — extending "out of page" toward hinge side -->
    <g>
      <ellipse cx="410" cy="165" rx="22" ry="24" fill="#555" stroke="#222" stroke-width="1.5"/>
      <path d="M 410 141 L 600 141 L 600 189 L 410 189 Z" fill="#555" stroke="#222" stroke-width="1.5"/>
      <ellipse cx="600" cy="165" rx="8" ry="24" fill="#3a3a3a" stroke="#111" stroke-width="1" opacity="0.6"/>
      <text x="635" y="171" font-size="26" fill="#333" font-weight="700">…</text>
      <text x="505" y="137" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">ACTUATOR BODY</text>
      <text x="505" y="212" text-anchor="middle" font-size="10" fill="#666" font-style="italic">runs horizontally toward hinge side (along top of window)</text>
    </g>

    <!-- Critical constraint annotation -->
    <path d="M 252 170 L 180 100 L 90 100" fill="none" stroke="#c0392b" stroke-width="1.2" marker-end="url(#arrow-end)"/>
    <text x="-15" y="85" font-size="10" fill="#c0392b" font-weight="700">bracket must sit</text>
    <text x="-15" y="99" font-size="10" fill="#c0392b" font-weight="700">ABOVE sash top level</text>
    <text x="-15" y="113" font-size="10" fill="#555">(sash protrudes 20 mm,</text>
    <text x="-15" y="126" font-size="10" fill="#555">would block a lower arm)</text>

    <!-- Sash top level reference line -->
    <line x1="-5" y1="250" x2="175" y2="250" stroke="#c0392b" stroke-dasharray="4,3" stroke-width="1"/>
    <text x="-12" y="254" text-anchor="end" font-size="9" fill="#c0392b" font-style="italic">sash top level</text>

  </g>

  <!-- Legend -->
  <g transform="translate(60, 580)">
    <rect x="0" y="-12" width="16" height="12" fill="#7a4f24" stroke="#2a1a08"/>
    <text x="22" y="-2" font-size="11" fill="#333">frame (PVC profile)</text>

    <rect x="160" y="-12" width="16" height="12" fill="#2f6e4a" stroke="#123a26"/>
    <text x="182" y="-2" font-size="11" fill="#333">sash</text>

    <rect x="240" y="-12" width="16" height="12" fill="#b92c2c" stroke="#5a0d0d"/>
    <text x="262" y="-2" font-size="11" fill="#333">3D-printed bracket</text>

    <circle cx="400" cy="-6" r="7" fill="#fff" stroke="#222" stroke-width="1.5"/>
    <text x="412" y="-2" font-size="11" fill="#333">M6 rod-end (ball joint)</text>

    <rect x="555" y="-12" width="16" height="12" fill="#555" stroke="#222"/>
    <text x="577" y="-2" font-size="11" fill="#333">linear actuator body</text>

    <rect x="725" y="-12" width="16" height="12" fill="#e0e0e0" stroke="#888"/>
    <text x="747" y="-2" font-size="11" fill="#333">ceiling / wall</text>
  </g>
</svg>
