<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12">
  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#aaa" stroke-width="1"/>
    </pattern>
    <marker id="arrow-end" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#444"/>
    </marker>
    <marker id="dim-start" markerWidth="10" markerHeight="10" refX="1" refY="3" orient="auto">
      <polygon points="10 0, 0 3, 10 6" fill="#666"/>
    </marker>
    <marker id="dim-end" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#666"/>
    </marker>
    <marker id="red-arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#c0392b"/>
    </marker>
  </defs>

  <rect width="1000" height="640" fill="#fafafa"/>

  <text x="500" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#111">
    Mounting detail — side cross-section at the moving anchor (sash end)
  </text>
  <text x="500" y="50" text-anchor="middle" font-size="12" fill="#666" font-style="italic">
    vertical cut at X = d = 120 mm from hinge · scale 2.5 px / mm · outside ← · → room
  </text>

  <text x="60" y="330" text-anchor="middle" font-size="13" fill="#666" font-style="italic">← outside</text>
  <text x="940" y="330" text-anchor="middle" font-size="13" fill="#666" font-style="italic">room →</text>

  <g transform="translate(180, 75)">

    <!-- Ceiling -->
    <rect x="0" y="0" width="560" height="25" fill="#e0e0e0" stroke="#888"/>
    <rect x="0" y="0" width="560" height="25" fill="url(#hatch)"/>
    <text x="280" y="16" text-anchor="middle" font-size="10" fill="#444">ceiling</text>

    <!-- FRAME — 80 mm deep × 80 mm tall, mostly hidden behind sash. -->
    <rect x="100" y="25" width="200" height="200" fill="#7a4f24" stroke="#2a1a08" stroke-width="1.8"/>
    <text x="200" y="150" text-anchor="middle" font-size="12" fill="#fff" font-weight="700">FRAME</text>
    <text x="200" y="168" text-anchor="middle" font-size="9" fill="#ddd" font-style="italic">(80 mm deep × 80 mm tall)</text>

    <!-- Frame depth dimension -->
    <line x1="100" y1="15" x2="100" y2="-5" stroke="#666"/>
    <line x1="300" y1="15" x2="300" y2="-5" stroke="#666"/>
    <line x1="100" y1="5" x2="300" y2="5" stroke="#666" marker-start="url(#dim-start)" marker-end="url(#dim-end)"/>
    <text x="200" y="-8" text-anchor="middle" font-size="11" fill="#444">frame 80 mm</text>

    <!-- SASH — 80 mm thick, top 20 mm below ceiling, protrudes 20 mm past frame face (x = 300 → x = 350). -->
    <rect x="150" y="75" width="200" height="480" fill="#2f6e4a" stroke="#123a26" stroke-width="1.8"/>
    <text x="250" y="330" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">SASH</text>
    <text x="250" y="350" text-anchor="middle" font-size="10" fill="#ddd" font-style="italic">(80 mm thick, room face</text>
    <text x="250" y="363" text-anchor="middle" font-size="10" fill="#ddd" font-style="italic">20 mm past frame face)</text>

    <!-- Sash thickness dimension -->
    <line x1="150" y1="565" x2="150" y2="585" stroke="#666"/>
    <line x1="350" y1="565" x2="350" y2="585" stroke="#666"/>
    <line x1="150" y1="577" x2="350" y2="577" stroke="#666" marker-start="url(#dim-start)" marker-end="url(#dim-end)"/>
    <text x="250" y="598" text-anchor="middle" font-size="11" fill="#444">sash 80 mm</text>

    <!-- Sash lip (protrusion past frame) -->
    <line x1="300" y1="605" x2="300" y2="623" stroke="#c0392b" stroke-width="1.2"/>
    <line x1="350" y1="605" x2="350" y2="623" stroke="#c0392b" stroke-width="1.2"/>
    <line x1="300" y1="615" x2="350" y2="615" stroke="#c0392b" stroke-width="1.2" marker-start="url(#dim-start)" marker-end="url(#dim-end)"/>
    <text x="325" y="634" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="700">lip 20 mm</text>

    <!-- Glass schematic below sash top rail -->
    <line x1="220" y1="555" x2="220" y2="570" stroke="#99c" stroke-width="2.5"/>
    <line x1="300" y1="555" x2="300" y2="570" stroke="#99c" stroke-width="2.5"/>
    <text x="260" y="540" text-anchor="middle" font-size="9" fill="#667" font-style="italic">↓ double glass</text>

    <!-- BRACKET — mounts on sash's room-side face at x = 350.
         Plate: x=350-360 (5 mm thick), y=95-200 (42 mm tall on sash face).
         Rod-end threads directly through the plate — no extra arm needed, the sash lip
         already provides 20 mm standoff. -->
    <g>
      <!-- Mounting plate -->
      <rect x="350" y="95" width="10" height="105" fill="#b92c2c" stroke="#5a0d0d" stroke-width="1.2" rx="1.5"/>
      <!-- M4 screws through plate into sash -->
      <circle cx="345" cy="110" r="2.5" fill="#111"/>
      <circle cx="345" cy="148" r="2.5" fill="#111"/>
      <circle cx="345" cy="185" r="2.5" fill="#111"/>
      <text x="320" y="90" text-anchor="middle" font-size="10" fill="#b92c2c" font-weight="700">BRACKET</text>
      <text x="320" y="103" text-anchor="middle" font-size="9" fill="#b92c2c" font-style="italic">(plate only)</text>

      <!-- Rod-end shank passing through the plate -->
      <rect x="355" y="142" width="30" height="12" fill="#777" stroke="#333" stroke-width="1"/>
      <text x="370" y="135" text-anchor="middle" font-size="9" fill="#333" font-style="italic">M6 shank</text>
      <!-- Nut on the sash side of the plate -->
      <rect x="345" y="144" width="10" height="8" fill="#222"/>
    </g>

    <!-- Rod-end ball at the end of the shank -->
    <circle cx="398" cy="148" r="16" fill="#fff" stroke="#222" stroke-width="2"/>
    <circle cx="398" cy="148" r="6" fill="#333"/>
    <line x1="398" y1="132" x2="398" y2="164" stroke="#222" stroke-width="2"/>
    <text x="398" y="123" text-anchor="middle" font-size="10" fill="#222" font-weight="700">rod-end</text>

    <!-- ACTUATOR BODY — end-on. Extends OUT of page toward fixed end (top-middle of frame). -->
    <g>
      <ellipse cx="445" cy="148" rx="20" ry="22" fill="#555" stroke="#222" stroke-width="1.5"/>
      <path d="M 445 126 L 620 126 L 620 170 L 445 170 Z" fill="#555" stroke="#222" stroke-width="1.5"/>
      <ellipse cx="620" cy="148" rx="7" ry="22" fill="#3a3a3a" stroke="#111" stroke-width="1" opacity="0.6"/>
      <text x="655" y="154" font-size="26" fill="#333" font-weight="700">…</text>
      <text x="535" y="120" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">ACTUATOR BODY</text>
      <text x="535" y="193" text-anchor="middle" font-size="10" fill="#666" font-style="italic">runs toward fixed end (top-middle of frame)</text>
    </g>

    <!-- Bracket protrusion dimension — short arm: rod-end is ~33 mm past sash face. -->
    <line x1="350" y1="220" x2="350" y2="240" stroke="#666"/>
    <line x1="385" y1="220" x2="385" y2="240" stroke="#666"/>
    <line x1="350" y1="232" x2="385" y2="232" stroke="#666" marker-start="url(#dim-start)" marker-end="url(#dim-end)"/>
    <text x="367" y="253" text-anchor="middle" font-size="10" fill="#444">~14 mm shank protrusion</text>

    <!-- Width annotation (the bracket extends 190 mm along the sash into / out of page) -->
    <path d="M 360 280 Q 420 320, 500 310" fill="none" stroke="#555" stroke-width="1" marker-end="url(#arrow-end)"/>
    <text x="460" y="345" font-size="10" fill="#555">bracket extends 190 mm along</text>
    <text x="460" y="359" font-size="10" fill="#555">the sash top rail (into page)</text>

    <!-- Load analysis note -->
    <g transform="translate(440, 390)">
      <rect x="0" y="0" width="260" height="72" fill="#fff8e6" stroke="#c99b2b" stroke-width="1"/>
      <text x="130" y="18" text-anchor="middle" font-size="11" fill="#744" font-weight="700">load path is comfortable here</text>
      <text x="10" y="35" font-size="10" fill="#555">plate area: 190 × ~42 mm ≈ 8000 mm²</text>
      <text x="10" y="49" font-size="10" fill="#555">stall-force tensile stress ≈ 160 kPa</text>
      <text x="10" y="63" font-size="10" fill="#555">VHB limit ≈ 500 kPa → 3× margin; no hook needed</text>
    </g>

    <!-- Sash top reference line -->
    <line x1="-5" y1="75" x2="150" y2="75" stroke="#c0392b" stroke-dasharray="4,3" stroke-width="1"/>
    <text x="-12" y="79" text-anchor="end" font-size="9" fill="#c0392b" font-style="italic">sash top</text>
    <line x1="-5" y1="25" x2="100" y2="25" stroke="#888" stroke-dasharray="3,2" stroke-width="1"/>
    <text x="-12" y="29" text-anchor="end" font-size="9" fill="#888" font-style="italic">ceiling</text>

  </g>

  <!-- Legend -->
  <g transform="translate(60, 625)">
    <rect x="0" y="-14" width="16" height="12" fill="#7a4f24" stroke="#2a1a08"/>
    <text x="22" y="-4" font-size="11" fill="#333">frame (hidden)</text>

    <rect x="145" y="-14" width="16" height="12" fill="#2f6e4a" stroke="#123a26"/>
    <text x="167" y="-4" font-size="11" fill="#333">sash</text>

    <rect x="220" y="-14" width="16" height="12" fill="#b92c2c" stroke="#5a0d0d"/>
    <text x="242" y="-4" font-size="11" fill="#333">bracket (plate + M6 shank)</text>

    <circle cx="430" cy="-8" r="7" fill="#fff" stroke="#222" stroke-width="1.5"/>
    <text x="442" y="-4" font-size="11" fill="#333">M6 rod-end</text>

    <rect x="530" y="-14" width="16" height="12" fill="#555" stroke="#222"/>
    <text x="552" y="-4" font-size="11" fill="#333">actuator body</text>

    <rect x="670" y="-14" width="16" height="12" fill="#e0e0e0" stroke="#888"/>
    <text x="692" y="-4" font-size="11" fill="#333">ceiling</text>
  </g>
</svg>
