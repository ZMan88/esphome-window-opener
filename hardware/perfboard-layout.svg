<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12">
  <defs>
    <pattern id="perf-grid" patternUnits="userSpaceOnUse" width="10" height="10">
      <circle cx="5" cy="5" r="1" fill="#999"/>
    </pattern>
  </defs>

  <rect width="1000" height="750" fill="#fafafa"/>

  <text x="500" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#111">
    Perfboard layout — top-down view
  </text>
  <text x="500" y="50" text-anchor="middle" font-size="12" fill="#666" font-style="italic">
    Seeed XIAO ESP32-C6 + TMC2209 + LM2596 on a 70 × 90 mm protoboard, 2.54 mm grid · scale ~6 px / mm
  </text>

  <!-- Board outline -->
  <g transform="translate(120, 100)">
    <rect x="0" y="0" width="540" height="420" fill="#226633" stroke="#0e3a20" stroke-width="2" rx="3"/>
    <rect x="0" y="0" width="540" height="420" fill="url(#perf-grid)" opacity="0.4"/>

    <circle cx="15" cy="15" r="4" fill="#888" stroke="#0e3a20"/>
    <circle cx="525" cy="15" r="4" fill="#888" stroke="#0e3a20"/>
    <circle cx="15" cy="405" r="4" fill="#888" stroke="#0e3a20"/>
    <circle cx="525" cy="405" r="4" fill="#888" stroke="#0e3a20"/>

    <!-- XIAO ESP32-C6 (21 × 17.5 mm = ~126 × 105 px) at top-left
         Pin layout (USB-C at top): LEFT = 5V/GND/3V3/D0/D1/D2/D3,
                                    RIGHT = D10/D9/D8/D7/D6/D5/D4. -->
    <g transform="translate(40, 50)">
      <rect width="126" height="105" fill="#1a4a8a" stroke="#0e3a20" stroke-width="1.5" rx="2"/>
      <!-- castellated pads on the long edges -->
      <rect x="-3" y="6" width="6" height="93" fill="#0a0a0a"/>
      <rect x="123" y="6" width="6" height="93" fill="#0a0a0a"/>
      <text x="63" y="38" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">XIAO</text>
      <text x="63" y="54" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">ESP32-C6</text>
      <text x="63" y="70" text-anchor="middle" font-size="9" fill="#bbd">on female headers</text>
      <!-- USB-C connector at top -->
      <rect x="50" y="-4" width="26" height="8" fill="#444" stroke="#222"/>
      <text x="63" y="-7" text-anchor="middle" font-size="8" fill="#444">USB-C</text>
      <!-- LEFT side pins (5V at top closest to USB, D3 at bottom) -->
      <text x="-8" y="14" font-size="8" text-anchor="end" fill="#333">5V</text>
      <text x="-8" y="28" font-size="8" text-anchor="end" fill="#333">GND</text>
      <text x="-8" y="42" font-size="8" text-anchor="end" fill="#333">3V3</text>
      <text x="-8" y="56" font-size="8" text-anchor="end" fill="#333">D0</text>
      <text x="-8" y="70" font-size="8" text-anchor="end" fill="#c0392b" font-weight="700">D1 (DIR)</text>
      <text x="-8" y="84" font-size="8" text-anchor="end" fill="#c0392b" font-weight="700">D2 (STEP)</text>
      <text x="-8" y="98" font-size="8" text-anchor="end" fill="#c0392b" font-weight="700">D3 (EN)</text>
      <!-- RIGHT side pins (D10 at top closest to USB, D4 at bottom) -->
      <text x="134" y="14" font-size="8" fill="#333">D10</text>
      <text x="134" y="28" font-size="8" fill="#333">D9</text>
      <text x="134" y="42" font-size="8" fill="#c0392b" font-weight="700">D8 (endstop)</text>
      <text x="134" y="56" font-size="8" fill="#333">D7 / RX</text>
      <text x="134" y="70" font-size="8" fill="#333">D6 / TX</text>
      <text x="134" y="84" font-size="8" fill="#333">D5 / SCL</text>
      <text x="134" y="98" font-size="8" fill="#333">D4 / SDA</text>
    </g>

    <!-- TMC2209 V1.3 (21 × 16 mm) bottom-centre -->
    <g transform="translate(220, 240)">
      <rect width="126" height="100" fill="#5a3a8a" stroke="#0e3a20" stroke-width="1.5" rx="2"/>
      <rect x="-3" y="6" width="6" height="86" fill="#0a0a0a"/>
      <rect x="123" y="6" width="6" height="86" fill="#0a0a0a"/>
      <text x="63" y="40" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">TMC2209</text>
      <text x="63" y="58" text-anchor="middle" font-size="10" fill="#dcd">V1.3 + heatsink</text>
      <circle cx="40" cy="80" r="6" fill="#aaa" stroke="#666"/>
      <text x="40" y="83" text-anchor="middle" font-size="7" fill="#222">VREF</text>
    </g>

    <!-- 470 µF cap right next to TMC2209 -->
    <g transform="translate(370, 270)">
      <ellipse cx="20" cy="20" rx="20" ry="20" fill="#5a3010" stroke="#222"/>
      <text x="20" y="18" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">470µF</text>
      <text x="20" y="28" text-anchor="middle" font-size="9" fill="#fff">35 V</text>
      <line x1="14" y1="44" x2="14" y2="60" stroke="#222" stroke-width="1.5"/>
      <line x1="26" y1="44" x2="26" y2="60" stroke="#222" stroke-width="1.5"/>
      <text x="6" y="56" font-size="8" fill="#222">+</text>
      <text x="32" y="56" font-size="8" fill="#222">−</text>
      <text x="20" y="-8" text-anchor="middle" font-size="9" fill="#744" font-style="italic">very close to TMC2209 VM</text>
    </g>

    <!-- LM2596 Buck (43 × 22 mm) top-right -->
    <g transform="translate(380, 60)">
      <rect width="130" height="80" fill="#1f6e3a" stroke="#0e3a20" stroke-width="1.5" rx="2"/>
      <text x="65" y="34" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">LM2596</text>
      <text x="65" y="50" text-anchor="middle" font-size="10" fill="#cfc">12 V → 5 V</text>
      <rect x="100" y="58" width="14" height="14" fill="#aaa" stroke="#666"/>
      <text x="107" y="80" text-anchor="middle" font-size="7" fill="#222">ADJ</text>
    </g>

    <!-- Power input screw terminal (left edge) -->
    <g transform="translate(20, 200)">
      <rect width="40" height="30" fill="#3a8855" stroke="#0e3a20" rx="2"/>
      <circle cx="10" cy="15" r="4" fill="#666"/>
      <circle cx="30" cy="15" r="4" fill="#666"/>
      <text x="20" y="-4" text-anchor="middle" font-size="9" fill="#222" font-weight="700">12 V IN</text>
      <text x="20" y="44" text-anchor="middle" font-size="9" fill="#444">+   −</text>
    </g>

    <g transform="translate(80, 195)">
      <rect width="80" height="40" fill="#222" stroke="#000" rx="3"/>
      <rect x="10" y="12" width="60" height="16" fill="#888" stroke="#444"/>
      <text x="40" y="24" text-anchor="middle" font-size="10" fill="#222">FUSE 5 A</text>
      <text x="40" y="-4" text-anchor="middle" font-size="9" fill="#222">inline blade fuse</text>
    </g>

    <g transform="translate(480, 200)">
      <rect width="40" height="60" fill="#8e44ad" stroke="#0e3a20" rx="2"/>
      <circle cx="20" cy="10" r="4" fill="#666"/>
      <circle cx="20" cy="22" r="4" fill="#666"/>
      <circle cx="20" cy="38" r="4" fill="#666"/>
      <circle cx="20" cy="50" r="4" fill="#666"/>
      <text x="20" y="-4" text-anchor="middle" font-size="9" fill="#222" font-weight="700">MOTOR</text>
      <text x="50" y="14" font-size="9" fill="#444">A1</text>
      <text x="50" y="26" font-size="9" fill="#444">A2</text>
      <text x="50" y="42" font-size="9" fill="#444">B1</text>
      <text x="50" y="54" font-size="9" fill="#444">B2</text>
    </g>

    <g transform="translate(80, 370)">
      <rect width="40" height="30" fill="#7f8c8d" stroke="#0e3a20" rx="2"/>
      <circle cx="10" cy="15" r="4" fill="#666"/>
      <circle cx="30" cy="15" r="4" fill="#666"/>
      <text x="20" y="-4" text-anchor="middle" font-size="9" fill="#222" font-weight="700">ENDSTOP</text>
      <text x="20" y="44" text-anchor="middle" font-size="9" fill="#444">COM   NO</text>
    </g>

    <!-- Wire paths -->
    <line x1="40" y1="215" x2="80" y2="215" stroke="#c0392b" stroke-width="3"/>
    <line x1="160" y1="215" x2="220" y2="215" stroke="#c0392b" stroke-width="3"/>

    <line x1="220" y1="215" x2="220" y2="260" stroke="#c0392b" stroke-width="3"/>
    <line x1="220" y1="215" x2="220" y2="100" stroke="#c0392b" stroke-width="3"/>
    <line x1="220" y1="100" x2="380" y2="100" stroke="#c0392b" stroke-width="3"/>
    <text x="290" y="95" font-size="9" fill="#c0392b">+12 V to LM2596 IN+</text>

    <line x1="220" y1="260" x2="370" y2="260" stroke="#c0392b" stroke-width="3"/>
    <line x1="380" y1="270" x2="380" y2="260" stroke="#c0392b" stroke-width="3"/>
    <text x="280" y="255" font-size="9" fill="#c0392b">+12 V to cap + VM</text>

    <line x1="40" y1="240" x2="40" y2="380" stroke="#222" stroke-width="3"/>
    <line x1="40" y1="380" x2="500" y2="380" stroke="#222" stroke-width="3"/>
    <line x1="40" y1="120" x2="40" y2="240" stroke="#222" stroke-width="3"/>
    <line x1="40" y1="120" x2="380" y2="120" stroke="#222" stroke-width="3"/>
    <text x="80" y="375" font-size="9" fill="#222">GND bus</text>

    <!-- 5V from LM2596 OUT+ to XIAO 5V (LEFT edge, top pin at y = 50+14 = 64) -->
    <line x1="510" y1="100" x2="510" y2="30" stroke="#e67e22" stroke-width="3"/>
    <line x1="510" y1="30" x2="32" y2="30" stroke="#e67e22" stroke-width="3"/>
    <line x1="32" y1="30" x2="32" y2="64" stroke="#e67e22" stroke-width="3"/>
    <text x="240" y="25" font-size="9" fill="#e67e22">+5 V to XIAO 5V pin</text>

    <!-- D1 (DIR), D2 (STEP), D3 (EN) all on XIAO LEFT EDGE → TMC2209 left side -->
    <!-- D1 at (32, 120) → TMC2209 DIR (220, ~295) -->
    <line x1="32" y1="120" x2="20" y2="120" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="20" y1="120" x2="20" y2="200" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="20" y1="200" x2="220" y2="295" stroke="#7f8c8d" stroke-width="2"/>
    <text x="22" y="160" font-size="9" fill="#555">D1 → DIR</text>

    <!-- D2 at (32, 134) → TMC2209 STEP (220, 285) -->
    <line x1="32" y1="134" x2="14" y2="134" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="14" y1="134" x2="14" y2="210" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="14" y1="210" x2="220" y2="285" stroke="#7f8c8d" stroke-width="2"/>
    <text x="22" y="174" font-size="9" fill="#555">D2 → STEP</text>

    <!-- D3 at (32, 148) → TMC2209 EN (220, 305) -->
    <line x1="32" y1="148" x2="8" y2="148" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="8" y1="148" x2="8" y2="220" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="8" y1="220" x2="220" y2="305" stroke="#7f8c8d" stroke-width="2"/>
    <text x="22" y="188" font-size="9" fill="#555">D3 → EN</text>

    <!-- D8 on RIGHT EDGE at (174, 92) → endstop COM (90, 385) -->
    <line x1="174" y1="92" x2="200" y2="92" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="200" y1="92" x2="200" y2="170" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="200" y1="170" x2="50" y2="170" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="50" y1="170" x2="50" y2="385" stroke="#7f8c8d" stroke-width="2"/>
    <line x1="50" y1="385" x2="90" y2="385" stroke="#7f8c8d" stroke-width="2"/>
    <text x="208" y="160" font-size="9" fill="#555">D8 → endstop COM</text>

    <!-- TMC2209 motor outs A1/A2/B1/B2 to motor terminal -->
    <line x1="346" y1="270" x2="480" y2="220" stroke="#8e44ad" stroke-width="2"/>
    <line x1="346" y1="290" x2="480" y2="232" stroke="#8e44ad" stroke-width="2"/>
    <line x1="346" y1="310" x2="480" y2="248" stroke="#8e44ad" stroke-width="2"/>
    <line x1="346" y1="330" x2="480" y2="260" stroke="#8e44ad" stroke-width="2"/>
    <text x="395" y="280" font-size="9" fill="#8e44ad">A1 A2 B1 B2</text>
  </g>

  <!-- Notes panel -->
  <g transform="translate(700, 100)">
    <rect x="0" y="0" width="270" height="450" fill="#fff" stroke="#bbb" rx="3"/>
    <text x="135" y="25" text-anchor="middle" font-size="13" font-weight="700">Build notes</text>

    <text x="10" y="50" font-size="11" font-weight="700" fill="#c0392b">1. XIAO mounting</text>
    <text x="10" y="65" font-size="10" fill="#444">The XIAO has castellated edges, so</text>
    <text x="10" y="78" font-size="10" fill="#444">you can SMD-solder it flat OR plug</text>
    <text x="10" y="91" font-size="10" fill="#444">it into 2× 1×7 female pin headers.</text>
    <text x="10" y="104" font-size="10" fill="#444">Headers are recommended — keeps</text>
    <text x="10" y="117" font-size="10" fill="#444">the board removable for debug.</text>

    <text x="10" y="144" font-size="11" font-weight="700" fill="#c0392b">2. The 470 µF cap is critical</text>
    <text x="10" y="159" font-size="10" fill="#444">Solder it within 1-2 cm of the</text>
    <text x="10" y="172" font-size="10" fill="#444">TMC2209's VM pin. Do not put it</text>
    <text x="10" y="185" font-size="10" fill="#444">at the input terminal.</text>

    <text x="10" y="212" font-size="11" font-weight="700" fill="#c0392b">3. GND star point</text>
    <text x="10" y="227" font-size="10" fill="#444">All grounds (PSU, LM2596 IN−,</text>
    <text x="10" y="240" font-size="10" fill="#444">LM2596 OUT−, TMC2209 GND ×2,</text>
    <text x="10" y="253" font-size="10" fill="#444">XIAO GND, cap −, endstop NO)</text>
    <text x="10" y="266" font-size="10" fill="#444">tie to one bus on the board.</text>

    <text x="10" y="293" font-size="11" font-weight="700" fill="#c0392b">4. Trace width</text>
    <text x="10" y="308" font-size="10" fill="#444">Power and motor traces: thick</text>
    <text x="10" y="321" font-size="10" fill="#444">solder bridges or jumper wire</text>
    <text x="10" y="334" font-size="10" fill="#444">(≥ 18 AWG). Logic traces: any.</text>

    <text x="10" y="361" font-size="11" font-weight="700" fill="#c0392b">5. Set Vref BEFORE motor power</text>
    <text x="10" y="376" font-size="10" fill="#444">Power up just the XIAO + driver</text>
    <text x="10" y="389" font-size="10" fill="#444">(no motor connected). Adjust the</text>
    <text x="10" y="402" font-size="10" fill="#444">TMC2209 Vref pot to ~1.0 V using</text>
    <text x="10" y="415" font-size="10" fill="#444">a multimeter. Then power down,</text>
    <text x="10" y="428" font-size="10" fill="#444">connect motor, power on again.</text>
  </g>

  <text x="500" y="700" text-anchor="middle" font-size="11" fill="#666" font-style="italic">
    Wire paths are schematic — actual perfboard routing depends on which holes you use. Keep power and ground traces short and thick.
  </text>
</svg>
